; RavLight Core — platformio.ini
;
; To add a new board/fixture:
;   1. Create boards/<your_board>.h with HW_PIN_* and RAVLIGHT_HAS_* defines
;   2. Add a new [env:<board>_<fixture>] section below
;   3. Reference ${env.build_flags} and ${env.lib_deps} to inherit common config

; ── Common defaults ───────────────────────────────────────────────────────────
; Scalar options (platform, board, framework…) are inherited automatically.
; List options (build_flags, lib_deps) use REPLACE semantics when a named env
; defines them — use ${env.build_flags} / ${env.lib_deps} for explicit inherit.

[env]
platform               = espressif32@6.3.2
board                  = esp32dev
framework              = arduino
lib_compat_mode        = strict
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
monitor_speed          = 115200
extra_scripts =
    pre:flash_all.py
    post:scripts/rename_fw.py
build_flags =
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=1
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    LittleFS
    https://github.com/mathieucarbou/ESPAsyncWebServer
    ayushsharma82/ElegantOTA @ ~3.1.5
    SPI
    Wire
    bblanchon/ArduinoJson @ ^6.20.0
    https://github.com/marian-craciunescu/ESP32Ping
    h2zero/NimBLE-Arduino @ ^2.0.0

; ── Environments ──────────────────────────────────────────────────────────────

[env:xdmx_v2_veyron]
custom_fw_name = veyron_xdmx2
build_flags =
    ${env.build_flags}
    -include "boards/xdmx_v2.h"
    -D RAVLIGHT_MODULE_ETHERNET
    -D RAVLIGHT_MODULE_DMX_PHYSICAL
    -D RAVLIGHT_MODULE_RECORDER
    -D RAVLIGHT_MODULE_TEMP
    -D RAVLIGHT_MODULE_RESET
    -D RAVLIGHT_MODULE_DISCOVERY
    ;-D RAVLIGHT_MODULE_BLE
    -D RAVLIGHT_FIXTURE_VEYRON
lib_deps =
    ${env.lib_deps}
    https://github.com/adafruit/Adafruit_BusIO
    someweisguy/esp_dmx

[env:quinled_octa_elyon]
custom_fw_name = elyon_quinled_octa
;upload_port = COM8
build_flags =
    ${env.build_flags}
    -include "boards/quinled_octa.h"
    -D RAVLIGHT_MODULE_ETHERNET
    ; RAVLIGHT_MODULE_DISCOVERY disabled — ESP-NOW keeps the WiFi radio on, whose
    ; periodic activity disrupts Ethernet ArtNet RX (burst tails / high universes).
    ;-D RAVLIGHT_MODULE_DISCOVERY
    ;-D RAVLIGHT_MODULE_NFC
    ;-D RAVLIGHT_MODULE_BLE
    ;-D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -D RAVLIGHT_FIXTURE_ELYON
lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit PN532 @ ^1.3.4

; Experimental I2S parallel LED backend on the QuinLED Octa (single I2S0 peripheral
; drives all 8 outputs; lifts the per-output cap from 500 to 1024 pixels). Based on
; @Lefix2's fork (branch claude/epic-archimedes-4tTuP). Untested on hardware upstream.
[env:quinled_octa_elyon_i2s]
extends = env:quinled_octa_elyon
custom_fw_name = elyon_quinled_octa_i2s
build_flags =
    ${env:quinled_octa_elyon.build_flags}
    -D RAVLIGHT_MODULE_I2S_LED

[env:gledopto_elite4d_elyon]
custom_fw_name = elyon_gledopto_elite4d
build_flags =
    ${env.build_flags}
    -include "boards/gledopto_elite_4d.h"
    -D RAVLIGHT_MODULE_ETHERNET
    -D RAVLIGHT_MODULE_RESET
    -D RAVLIGHT_MODULE_DISCOVERY
    ;-D RAVLIGHT_MODULE_BLE
    ;-D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -D RAVLIGHT_FIXTURE_ELYON

[env:gledopto_elite2d_elyon]
custom_fw_name = elyon_gledopto_elite2d
build_flags =
    ${env.build_flags}
    -include "boards/gledopto_elite_2d.h"
    -D RAVLIGHT_MODULE_ETHERNET
    -D RAVLIGHT_MODULE_RESET
    -D RAVLIGHT_MODULE_DISCOVERY
    ;-D RAVLIGHT_MODULE_BLE
    ;-D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -D RAVLIGHT_FIXTURE_ELYON

[env:quinled_penta_plus_elyon]
custom_fw_name = elyon_quinled_penta_plus
build_flags =
    ${env.build_flags}
    -include "boards/quinled_penta_plus.h"
    -D RAVLIGHT_MODULE_ETHERNET
    -D RAVLIGHT_MODULE_DISCOVERY
    -D RAVLIGHT_FIXTURE_ELYON

[env:quinled_penta_deca_elyon]
custom_fw_name = elyon_quinled_penta_deca
build_flags =
    ${env.build_flags}
    -include "boards/quinled_penta_deca.h"
    -D RAVLIGHT_MODULE_DISCOVERY
    -D RAVLIGHT_FIXTURE_ELYON

[env:led_lifter_v5_orion]
custom_fw_name = orion_led_lifter_v5
board_build.flash_size = 8MB
board_build.psram      = enabled
upload_speed           = 921600
build_flags =
    ${env.build_flags}
    -include "boards/led_lifter_v5.h"
    -D RAVLIGHT_MODULE_ETHERNET
    -D RAVLIGHT_MODULE_DISCOVERY
    -D RAVLIGHT_FIXTURE_ORION
lib_deps =
    ${env.lib_deps}
    teemuatlut/TMCStepper
    gin66/FastAccelStepper

; Bring-up / signal-analyzer build for a plain ESP32-WROOM (no Ethernet, no DMX
; controller). Drives every registered universe with a synthetic walking-byte
; pattern at 40 fps — connect a logic analyzer to GPIO 18/19/21/22/23/25/26/27
; to validate the LED backend timing without external dependencies.
[env:generic_esp32_test_elyon]
custom_fw_name = elyon_generic_esp32_test
build_flags =
    ${env.build_flags}
    -include "boards/generic_esp32_test.h"
    -D RAVLIGHT_MODULE_TEST_PATTERN
    -D RAVLIGHT_FIXTURE_ELYON

; Same bring-up build but routed through the I2S parallel LED backend.
; Use this one to validate the I2S signal path on a logic analyzer.
[env:generic_esp32_test_elyon_i2s]
extends = env:generic_esp32_test_elyon
custom_fw_name = elyon_generic_esp32_test_i2s
build_flags =
    ${env:generic_esp32_test_elyon.build_flags}
    -D RAVLIGHT_MODULE_I2S_LED

[env:xdmx_v3_elyon]
custom_fw_name = elyon_xdmx_v3
build_flags =
    ${env.build_flags}
    -include "boards/xdmx_v3.h"
    -D RAVLIGHT_MODULE_ETHERNET
    -D RAVLIGHT_MODULE_DMX_PHYSICAL
    -D RAVLIGHT_MODULE_DMX_PHYSICAL_2
    -D RAVLIGHT_MODULE_TEMP
    -D RAVLIGHT_MODULE_RESET
    -D RAVLIGHT_MODULE_DISCOVERY
    -D RAVLIGHT_FIXTURE_ELYON
    -D RAVLIGHT_DISABLE_SERIAL
    -D CORE_DEBUG_LEVEL=0
lib_deps =
    ${env.lib_deps}
    someweisguy/esp_dmx
