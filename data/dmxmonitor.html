<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMX Monitor — RavLight</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    .monitor-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 12px 40px;
    }

    .monitor-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin: 24px auto 20px;
      flex-wrap: wrap;
    }
    .monitor-bar label {
      margin: 0;
      display: inline;
      font-size: 14px;
      color: #aaa;
    }
    .monitor-bar select {
      width: auto;
      padding: 8px 12px;
      margin: 0;
      min-width: 100px;
    }
    .monitor-bar button {
      width: auto;
      margin: 0;
      padding: 8px 22px;
      font-size: 13px;
      border-radius: 20px;
    }

    .dmx-grid-wrap {
      overflow-x: auto;
      width: 100%;
      margin: 0 auto;
      -webkit-overflow-scrolling: touch;
    }

    .dmx-grid {
      display: grid;
      grid-template-columns: repeat(32, 30px);
      gap: 2px;
      width: fit-content;
      margin: 0 auto;
      font-family: 'Roboto Mono', monospace;
    }

    .dmx-cell {
      width: 30px;
      height: 40px;
      background: #111;
      border-radius: 2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 3px 0 3px;
      box-sizing: border-box;
      cursor: default;
      transition: background 0.08s;
    }
    .dmx-cell .ch {
      font-size: 7px;
      color: #3a3a3a;
      line-height: 1;
      user-select: none;
      font-family: monospace;
    }
    .dmx-cell .val {
      font-size: 10px;
      font-weight: bold;
      color: #ddd;
      line-height: 1;
      user-select: none;
      font-family: monospace;
    }
    .dmx-cell.fixture {
      box-shadow: inset 0 0 0 1px #e9ff00;
    }
    .dmx-cell.fixture .ch {
      color: #7a8800;
    }
    .dmx-cell:hover {
      transform: scale(1.4);
      z-index: 10;
      position: relative;
      box-shadow: 0 0 10px rgba(233,255,0,0.5), inset 0 0 0 1px #e9ff00;
    }

    .legend {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin: 16px 0 8px;
      font-size: 11px;
      color: #555;
      flex-wrap: wrap;
    }
    .legend-fixture {
      color: #e9ff00;
    }

    .btn-back {
      display: block;
      width: 80%;
      max-width: 300px;
      margin: 28px auto 0;
      padding: 11px;
      text-align: center;
      background: rgba(0,0,0,0.7);
      border: 1px solid #e9ff00;
      color: #e9ff00;
      text-decoration: none;
      border-radius: 40px;
      font-size: 15px;
      transition: background 0.2s, color 0.2s;
    }
    .btn-back:hover {
      background: #7d8800;
      color: #000;
      text-decoration: none;
    }

    #hdrUniverse {
      font-size: 0.85em;
      color: #999;
    }
  </style>
</head>
<body>
  <header class="main-header">
    <div class="header-left">
      <img src="RavLightLogo.png" alt="RavLight">
    </div>
    <div class="header-right">
      <div class="header-item" style="font-size:1.05em;font-weight:bold;">DMX Monitor</div>
      <div class="header-item" id="hdrUniverse">Universe 0</div>
      <div class="header-item" id="hdrStatus" style="font-size:0.8em;color:#555;">connecting…</div>
    </div>
  </header>

  <h1>DMX Monitor</h1>

  <div class="monitor-page">

    <div class="monitor-bar">
      <label for="universeSelect">Universe</label>
      <select id="universeSelect" onchange="changeUniverse(+this.value)"></select>
      <button id="liveBtn" onclick="toggleLive()">⏸ Pause</button>
    </div>

    <div class="dmx-grid-wrap">
      <div id="dmxGrid" class="dmx-grid"></div>
    </div>

    <div class="legend">
      <span class="legend-fixture">■ Fixture channel</span>
      <span>Cell brightness = DMX value &nbsp;·&nbsp; 0 = dark &nbsp;·&nbsp; 255 = yellow</span>
    </div>

    <a href="/" class="btn-back">← Back</a>

  </div>

  <div id="toast"></div>

  <script>
    const CHANNELS = 512;

    let currentUniverse = 0;
    let fixtureMap     = {};   // String(universe) → Set of 1-indexed channel numbers
    let fixtureUniverses = []; // sorted universe numbers that have fixture channels
    let isLive         = true;
    let pollInterval   = null;
    let cells          = [];   // [{el, valEl}] index 0 = ch1

    // ── Build grid ──────────────────────────────────────────────────────────────
    function buildGrid() {
      const grid = document.getElementById('dmxGrid');
      grid.innerHTML = '';
      cells = [];
      for (let i = 1; i <= CHANNELS; i++) {
        const div = document.createElement('div');
        div.className = 'dmx-cell';

        const ch = document.createElement('span');
        ch.className = 'ch';
        ch.textContent = i;

        const val = document.createElement('span');
        val.className = 'val';
        val.textContent = '0';

        div.appendChild(ch);
        div.appendChild(val);
        grid.appendChild(div);
        cells.push({ el: div, valEl: val });
      }
    }

    // ── Value → background color ─────────────────────────────────────────────
    function cellBg(v) {
      if (v === 0) return '#111';
      const a = 0.07 + (v / 255) * 0.65;
      return 'rgba(233,255,0,' + a.toFixed(2) + ')';
    }

    // ── Apply values array (512 elements, 0-indexed = ch1) ────────────────────
    function updateGrid(values) {
      const fixSet = fixtureMap[String(currentUniverse)] || new Set();
      for (let i = 0; i < CHANNELS; i++) {
        const v = values[i] || 0;
        const c = cells[i];
        c.el.style.background = cellBg(v);
        c.valEl.textContent = v;
        if (fixSet.has(i + 1)) {
          c.el.classList.add('fixture');
        } else {
          c.el.classList.remove('fixture');
        }
      }
    }

    // ── Load fixture channel map & populate universe selector ─────────────────
    async function loadMap() {
      try {
        const r = await fetch('/dmxmap');
        const data = await r.json();
        const raw = data.map || {};
        fixtureMap = {};
        fixtureUniverses = Object.keys(raw).map(Number).sort((a, b) => a - b);
        for (const [uStr, ranges] of Object.entries(raw)) {
          const s = new Set();
          for (const [lo, hi] of ranges) {
            for (let c = lo; c <= hi; c++) s.add(c);
          }
          fixtureMap[uStr] = s;
        }
      } catch(e) {
        console.warn('dmxmap unavailable:', e);
      }

      const sel = document.getElementById('universeSelect');
      sel.innerHTML = '';
      const allU = new Set([0, ...fixtureUniverses]);
      for (const u of [...allU].sort((a, b) => a - b)) {
        const opt = document.createElement('option');
        opt.value = u;
        opt.textContent = fixtureUniverses.includes(u) ? u + ' ★' : String(u);
        sel.appendChild(opt);
      }

      // Default to first fixture universe
      if (fixtureUniverses.length > 0) {
        currentUniverse = fixtureUniverses[0];
        sel.value = currentUniverse;
      }
      updateHeader();
    }

    // ── Poll DMX values ───────────────────────────────────────────────────────
    async function poll() {
      try {
        const r = await fetch('/dmxdata?universe=' + currentUniverse);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const values = await r.json();
        updateGrid(values);
        document.getElementById('hdrStatus').textContent = 'live';
        document.getElementById('hdrStatus').style.color = '#e9ff00';
      } catch(e) {
        document.getElementById('hdrStatus').textContent = 'offline';
        document.getElementById('hdrStatus').style.color = '#ff4444';
      }
    }

    function updateHeader() {
      document.getElementById('hdrUniverse').textContent = 'Universe ' + currentUniverse;
    }

    function startLive() {
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(poll, 150);
      isLive = true;
      document.getElementById('liveBtn').textContent = '⏸ Pause';
      document.getElementById('hdrStatus').textContent = 'live';
      document.getElementById('hdrStatus').style.color = '#e9ff00';
    }

    function stopLive() {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
      isLive = false;
      document.getElementById('liveBtn').textContent = '▶ Live';
      document.getElementById('hdrStatus').textContent = 'paused';
      document.getElementById('hdrStatus').style.color = '#888';
    }

    function toggleLive() {
      isLive ? stopLive() : startLive();
    }

    function changeUniverse(u) {
      currentUniverse = u;
      updateHeader();
      // Refresh fixture highlights immediately with current displayed values
      const cur = cells.map(c => parseInt(c.valEl.textContent, 10) || 0);
      updateGrid(cur);
      if (isLive) poll();
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerHTML = msg;
      t.className = 'toast show';
      setTimeout(() => { t.className = t.className.replace('show', ''); }, 3000);
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    buildGrid();
    loadMap().then(() => {
      poll();
      startLive();
    });
  </script>
</body>
</html>
